<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoreKeep - Mobile Scorekeeping</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-900 text-white">
    <div id="app" class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="bg-gradient-to-r from-blue-600 to-purple-600 p-4 shadow-lg">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 class="text-2xl font-bold">ScoreKeep</h1>
                <button id="settingsBtn" class="bg-white bg-opacity-20 hover:bg-opacity-30 px-3 py-2 rounded">⚙️</button>
            </div>
        </header>

        <!-- Settings Modal -->
        <div id="settingsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
            <div class="bg-gray-800 rounded-lg p-6 max-w-sm w-full">
                <h2 class="text-xl font-bold mb-4">Game Settings</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Number of Teams</label>
                        <input id="teamCountInput" type="number" min="2" max="8" value="2" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Game Type</label>
                        <select id="gameTypeSelect" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2">
                            <option value="points">Points</option>
                            <option value="rounds">Rounds Won</option>
                            <option value="custom">Custom</option>
                        </select>
                    </div>

                    <button id="applySettingsBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-2 rounded font-semibold">Apply Settings</button>
                    <button id="resetGameBtn" class="w-full bg-red-600 hover:bg-red-700 py-2 rounded font-semibold">Reset Game</button>
                    <button id="closeSettingsBtn" class="w-full bg-gray-600 hover:bg-gray-700 py-2 rounded">Close</button>
                </div>
            </div>
        </div>

        <!-- Main Game Area -->
        <main class="flex-1 p-4 max-w-7xl mx-auto w-full">
            <div id="teamsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 auto-rows-max">
                <!-- Teams will be generated here -->
            </div>
        </main>

        <!-- Footer with Info -->
        <footer class="bg-gray-800 p-4 text-center text-sm text-gray-400">
            <p>ScoreKeep - Real-time Scorekeeping for Game Changer & Similar Games</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
